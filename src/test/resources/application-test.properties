spring.datasource.url=jdbc:h2:mem:toothfairy;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none

spring.liquibase.enabled=true

logging.level.liquibase=WARN

security.jwt.secret=TEST_ONLY_DO_NOT_USE_IN_PRODUCTION_MIN_256_BITS_SECRET_VALUE_FOR_HS256_ALGORITHM
security.jwt.expiration-ms=3600000
