name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tiaanvanrooyen
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tooth_fairy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tiaanvanrooyen -d tooth_fairy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tooth_fairy
      SPRING_DATASOURCE_USERNAME: tiaanvanrooyen
      SPRING_DATASOURCE_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Upload runnable JAR (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tooth-fairy-api-jar
          path: target/tooth-fairy-api-*.jar
          if-no-files-found: error
