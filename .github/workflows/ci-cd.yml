name: CI/CD

on:
  push:
    branches: [main, master, prod]
  pull_request:
    branches: [main, master, prod]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Upload runnable JAR (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tooth-fairy-api-jar
          path: target/tooth-fairy-api-*.jar
          if-no-files-found: error
